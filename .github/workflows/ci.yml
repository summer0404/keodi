name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-api-gateway:
    name: Test api-gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: keodi-microservice/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Run E2E tests (JWT guard + HTTP routing)
        run: npm run test:e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api-gateway
          path: keodi-microservice/api-gateway/coverage/
          retention-days: 7

  test-auth-service:
    name: Test auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: keodi-microservice/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-auth-service
          path: keodi-microservice/auth-service/coverage/
          retention-days: 7

  test-core-service:
    name: Test core-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/core-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: keodi-microservice/core-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-core-service
          path: keodi-microservice/core-service/coverage/
          retention-days: 7

  test-notification-service:
    name: Test notification-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: keodi-microservice/notification-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-notification-service
          path: keodi-microservice/notification-service/coverage/
          retention-days: 7

  test-intelligence-service:
    name: Test intelligence-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/intelligence-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: keodi-microservice/intelligence-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Prisma client
        run: prisma generate --schema=app/database/schema.prisma

      - name: Run unit tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-intelligence-service
          path: keodi-microservice/intelligence-service/coverage.xml
          retention-days: 7

  test-integration:
    name: Integration Tests (DB / Redis / Kafka)
    needs:
      - test-api-gateway
      - test-auth-service
      - test-core-service
      - test-notification-service
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: keodi_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_123
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "nc -z localhost 9092"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            keodi-microservice/integration-tests/package-lock.json
            keodi-microservice/auth-service/package-lock.json

      - name: Install integration-tests dependencies
        working-directory: keodi-microservice/integration-tests
        run: npm ci

      - name: Install auth-service dependencies
        working-directory: keodi-microservice/auth-service
        run: npm ci

      - name: Apply auth-service Prisma migrations to test DB
        working-directory: keodi-microservice/auth-service
        env:
          DATABASE_URL: postgresql://test_user:test_password_123@localhost:5435/keodi_test
        run: npx --yes prisma migrate deploy --config=src/configs/prisma.config.ts

      - name: Run Database integration tests
        working-directory: keodi-microservice/integration-tests
        env:
          DATABASE_URL: postgresql://test_user:test_password_123@localhost:5435/keodi_test
        run: npm run test:db

      - name: Run Redis integration tests
        working-directory: keodi-microservice/integration-tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: npm run test:redis

      - name: Run Kafka integration tests
        working-directory: keodi-microservice/integration-tests
        env:
          KAFKA_BROKER: localhost:9092
        run: npm run test:kafka

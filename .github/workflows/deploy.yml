name: CI / Build & Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. DETECT CHANGES
  # ============================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.check.outputs.api-gateway }}
      auth-service: ${{ steps.check.outputs.auth-service }}
      core-service: ${{ steps.check.outputs.core-service }}
      notification-service: ${{ steps.check.outputs.notification-service }}
      intelligence-service: ${{ steps.check.outputs.intelligence-service }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Check changes
        id: check
        run: |
          if [[ "${{ github.event.inputs.services }}" == "all" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "api-gateway=true" >> $GITHUB_OUTPUT
            echo "auth-service=true" >> $GITHUB_OUTPUT
            echo "core-service=true" >> $GITHUB_OUTPUT
            echo "notification-service=true" >> $GITHUB_OUTPUT
            echo "intelligence-service=true" >> $GITHUB_OUTPUT
          else
            SERVICES="${{ github.event.inputs.services }}"
            for svc in api-gateway auth-service core-service notification-service intelligence-service; do
              if echo "$SERVICES" | grep -q "$svc"; then
                echo "${svc}=true" >> $GITHUB_OUTPUT
              else
                echo "${svc}=false" >> $GITHUB_OUTPUT
              fi
            done
          fi

  # ============================================================
  # 2. TEST — runs per service in parallel, gates the build
  # ============================================================
  test-api-gateway:
    name: Test api-gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api-gateway
          path: keodi-microservice/api-gateway/coverage/
          retention-days: 7

  test-auth-service:
    name: Test auth-service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-auth-service
          path: keodi-microservice/auth-service/coverage/
          retention-days: 7

  test-core-service:
    name: Test core-service
    needs: detect-changes
    if: needs.detect-changes.outputs.core-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/core-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-core-service
          path: keodi-microservice/core-service/coverage/
          retention-days: 7

  test-notification-service:
    name: Test notification-service
    needs: detect-changes
    if: needs.detect-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-notification-service
          path: keodi-microservice/notification-service/coverage/
          retention-days: 7

  test-intelligence-service:
    name: Test intelligence-service
    needs: detect-changes
    if: needs.detect-changes.outputs.intelligence-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keodi-microservice/intelligence-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: keodi-microservice/intelligence-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Prisma client
        run: prisma generate --schema=app/database/schema.prisma

      - name: Run unit tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-intelligence-service
          path: keodi-microservice/intelligence-service/coverage.xml
          retention-days: 7

  # ============================================================
  # 3. BUILD — only runs after tests pass for that service
  # ============================================================
  build-api-gateway:
    name: Build api-gateway
    needs: [detect-changes, test-api-gateway]
    if: needs.detect-changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./keodi-microservice/api-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api-gateway:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/api-gateway:latest

  build-auth-service:
    name: Build auth-service
    needs: [detect-changes, test-auth-service]
    if: needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./keodi-microservice/auth-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/auth-service:latest

  build-core-service:
    name: Build core-service
    needs: [detect-changes, test-core-service]
    if: needs.detect-changes.outputs.core-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./keodi-microservice/core-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/core-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/core-service:latest

  build-notification-service:
    name: Build notification-service
    needs: [detect-changes, test-notification-service]
    if: needs.detect-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./keodi-microservice/notification-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/notification-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/notification-service:latest

  build-intelligence-service:
    name: Build intelligence-service
    needs: [detect-changes, test-intelligence-service]
    if: needs.detect-changes.outputs.intelligence-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./keodi-microservice/intelligence-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/intelligence-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/intelligence-service:latest

  # ============================================================
  # 4. DEPLOY — blocked if any test or build failed
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs:
      - detect-changes
      - test-api-gateway
      - test-auth-service
      - test-core-service
      - test-notification-service
      - test-intelligence-service
      - build-api-gateway
      - build-auth-service
      - build-core-service
      - build-notification-service
      - build-intelligence-service
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "keodi-microservice/docker-compose.prod.yml,keodi-microservice/monitoring/"
          strip_components: 1
          target: "/opt/keodi"

      - name: Deploy services
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ needs.detect-changes.outputs.version }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: TAG
          script: |
            cd /opt/keodi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export GITHUB_REPOSITORY=${{ github.repository }}
            export TAG=$TAG
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker container prune -f
            docker image prune -a -f
            sleep 30
            docker compose -f docker-compose.prod.yml ps

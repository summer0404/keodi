[pytest]
# Pytest configuration for intelligence-service tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test organization
markers =
    asyncio: marks tests as asyncio (deselect with '-m "not asyncio"')

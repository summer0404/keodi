# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alert-rules.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter - System metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "keodi-vps"

  # API Gateway
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]
        labels:
          service: "api-gateway"

  # Auth Service
  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
        labels:
          service: "auth-service"

  # Notification Service
  - job_name: "notification-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:3002"]
        labels:
          service: "notification-service"

  # Core Service
  - job_name: "core-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["core-service:3003"]
        labels:
          service: "core-service"

  # Intelligence Service
  - job_name: "intelligence-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["intelligence-service:3004"]
        labels:
          service: "intelligence-service"

  # Docker daemon metrics (optional - requires Docker daemon config)
  # - job_name: "docker"
  #   static_configs:
  #     - targets: ["host.docker.internal:9323"]

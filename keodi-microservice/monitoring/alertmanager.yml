# =============================================================================
# Alertmanager Configuration
# Replace SLACK_WEBHOOK_URL with your actual Slack webhook URL
# =============================================================================

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "slack-notifications"

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: "slack-critical"
      group_wait: 5s
      repeat_interval: 15m

    # Warning alerts → normal notification
    - match:
        severity: warning
      receiver: "slack-notifications"
      repeat_interval: 4h

receivers:
  - name: "slack-notifications"
    slack_configs:
      - api_url: "SLACK_WEBHOOK_URL"
        channel: "#keodi-alerts"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonAnnotations.summary }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}

  - name: "slack-critical"
    slack_configs:
      - api_url: "SLACK_WEBHOOK_URL"
        channel: "#keodi-alerts-critical"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨 CRITICAL{{ else }}✅ RESOLVED{{ end }} {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instance:* {{ .CommonLabels.instance }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

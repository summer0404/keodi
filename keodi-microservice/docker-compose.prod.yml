# =============================================================================
# Keodi Microservice - Production Docker Compose
# Usage: GITHUB_REPOSITORY=owner/repo docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      ALLOW_PLAINTEXT_LISTENER: "yes"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ─────────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────────
  api-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/api-gateway:${TAG:-latest}
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./env/api-gateway.env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  auth-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/auth-service:${TAG:-latest}
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./env/auth-service.env
    depends_on:
      kafka:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  notification-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/notification-service:${TAG:-latest}
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - ./env/notification-service.env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  core-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/core-service:${TAG:-latest}
    container_name: core-service
    restart: unless-stopped
    env_file:
      - ./env/core-service.env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  intelligence-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/intelligence-service:${TAG:-latest}
    container_name: intelligence-service
    restart: unless-stopped
    env_file:
      - ./env/intelligence-service.env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - keodi-net
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  keodi-net:
    driver: bridge

# =============================================================================
# Keodi Microservice - Build & Deploy Pipeline
# Trigger: Tag release (v*) or manual workflow_dispatch
# =============================================================================

name: 🚀 Build & Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ============================================
  # Job 1: Detect which services changed
  # ============================================
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.check.outputs.api-gateway }}
      auth-service: ${{ steps.check.outputs.auth-service }}
      core-service: ${{ steps.check.outputs.core-service }}
      notification-service: ${{ steps.check.outputs.notification-service }}
      intelligence-service: ${{ steps.check.outputs.intelligence-service }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Check changes
        id: check
        run: |
          if [[ "${{ github.event.inputs.services }}" == "all" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "api-gateway=true" >> $GITHUB_OUTPUT
            echo "auth-service=true" >> $GITHUB_OUTPUT
            echo "core-service=true" >> $GITHUB_OUTPUT
            echo "notification-service=true" >> $GITHUB_OUTPUT
            echo "intelligence-service=true" >> $GITHUB_OUTPUT
          else
            SERVICES="${{ github.event.inputs.services }}"
            for svc in api-gateway auth-service core-service notification-service intelligence-service; do
              if echo "$SERVICES" | grep -q "$svc"; then
                echo "${svc}=true" >> $GITHUB_OUTPUT
              else
                echo "${svc}=false" >> $GITHUB_OUTPUT
              fi
            done
          fi

  # ============================================
  # Job 2: Build & Push Docker images (parallel)
  # ============================================
  build-api-gateway:
    name: 🏗️ Build api-gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api-gateway:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/api-gateway:latest

  build-auth-service:
    name: 🏗️ Build auth-service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/auth-service:latest

  build-core-service:
    name: 🏗️ Build core-service
    needs: detect-changes
    if: needs.detect-changes.outputs.core-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./core-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/core-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/core-service:latest

  build-notification-service:
    name: 🏗️ Build notification-service
    needs: detect-changes
    if: needs.detect-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/notification-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/notification-service:latest

  build-intelligence-service:
    name: 🏗️ Build intelligence-service
    needs: detect-changes
    if: needs.detect-changes.outputs.intelligence-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./intelligence-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/intelligence-service:${{ needs.detect-changes.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/intelligence-service:latest

  # ============================================
  # Job 3: Deploy to VPS via SSH
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    needs:
      - detect-changes
      - build-api-gateway
      - build-auth-service
      - build-core-service
      - build-notification-service
      - build-intelligence-service
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,docker-compose.monitoring.yml,monitoring/"
          target: "/opt/keodi"

      - name: Deploy services
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ needs.detect-changes.outputs.version }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: TAG
          script: |
            cd /opt/keodi

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set environment variables
            export GITHUB_REPOSITORY=${{ github.repository }}
            export TAG=$TAG

            # Pull latest images
            echo "📥 Pulling images (tag: $TAG)..."
            docker compose -f docker-compose.prod.yml pull

            # Deploy application services
            echo "🚀 Starting application services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Deploy monitoring stack
            echo "📊 Starting monitoring stack..."
            docker compose -f docker-compose.monitoring.yml up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

            # Wait for services to start
            echo "⏳ Waiting 30s for services to initialize..."
            sleep 30

            # Health checks
            echo "🔍 Service status:"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.monitoring.yml ps

            echo "✅ Deploy complete! Tag: $TAG"

  # ============================================
  # Job 4: Notify via Slack
  # ============================================
  notify:
    name: 📢 Notify
    needs: [detect-changes, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="✅ SUCCESS"
            COLOR="good"
          else
            STATUS="❌ FAILED"
            COLOR="danger"
          fi

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$STATUS — Keodi Deploy\",
                \"fields\": [
                  {\"title\": \"Version\", \"value\": \"${{ needs.detect-changes.outputs.version }}\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": false}
                ],
                \"footer\": \"GitHub Actions\",
                \"ts\": $(date +%s)
              }]
            }"
